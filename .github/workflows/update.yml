name: Update Market Breadth Data

on:
  schedule:
    # 매일 미국장 마감 후 (UTC 21:30 = EST 16:30 = KST 06:30)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy

      - name: Run breadth collector
        run: |
          python breadth_collector.py --init
        timeout-minutes: 20

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/market_breadth.json
          git diff --staged --quiet || git commit -m "📊 Update market breadth data $(date +'%Y-%m-%d')"
          git push
